<rect x="383" y="516" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="399" y="525" font-size="12" fill="#5F5E5A">Bitcoin yield</text>
</svg>
